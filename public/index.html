<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D85A30" />
    <title>Pinterest Pin Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Dancing+Script:wght@700&family=Lora:ital,wght@0,700;1,700&family=Montserrat:wght@700;800;900&family=Oswald:wght@600;700&family=Merriweather:ital,wght@0,700;1,700&family=Abril+Fatface&family=Lobster&family=Raleway:ital,wght@0,800;0,900;1,800&family=Bebas+Neue&family=Pacifico&family=Righteous&family=Satisfy&family=Comfortaa:wght@700&family=Nunito:wght@800;900&family=Anton&family=Cinzel:wght@700;900&family=Great+Vibes&family=Italiana&family=Cormorant+Garamond:ital,wght@0,700;1,700&family=Josefin+Sans:wght@700&family=Quicksand:wght@700&family=Permanent+Marker&family=Alfa+Slab+One&family=Fjalla+One&family=Secular+One&family=Spectral:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Poppins', sans-serif; background: #f5f5f5; color: #222; }
      #root { max-width: 1240px; margin: 0 auto; padding: 24px 20px 80px; }
      input[type=text],input[type=url],select,textarea{width:100%;padding:7px 10px;border:0.5px solid #ddd;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;background:#fff;color:#222;outline:none}
      input[type=text]:focus,select:focus,textarea:focus{border-color:#D85A30}
      textarea{resize:vertical}
      input[type=range]{accent-color:#D85A30;width:100%}
      input[type=file]{font-size:12px;color:#666}
      input[type=color]{width:38px;height:30px;border:0.5px solid #ddd;border-radius:6px;cursor:pointer;padding:2px;background:#fff}
      button{font-family:'Poppins',sans-serif}
      ::-webkit-scrollbar{width:7px;height:7px} ::-webkit-scrollbar-track{background:#f0f0f0} ::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
      .pin-thumb{cursor:pointer;border:2.5px solid transparent;border-radius:10px;transition:border-color .15s}
      .pin-thumb.sel{border-color:#D85A30}
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
